# Granite TTM r2 Battery Surge held-out config.
#
# Each window is one held-out storm or calm period at NOAA station 8518750
# (The Battery, NY). The fine-tune ingests the prior history_* range
# (1024 hours = ~43 days) and is scored on its forecast over the
# target_* range (96 hours = 4 days). All dates are YYYYMMDD GMT.
#
# The fine-tune was trained on hourly-resampled surge residual; we
# fetch 6-min CO-OPS data and average into hourly buckets to match.
#
# Construction rule: each window is selected from outside the published
# training range (2015-01-01 to 2024-12-31). The 2024 windows below are
# in the last weeks of the test split (the model card uses 2023-2024 as
# the test split), and the 2026 windows are outside the training range
# entirely. See docs/PROVENANCE.md.

model_id: msradam/Granite-TTM-r2-Battery-Surge
model_revision: null

station: "8518750"

# Hourly cadence to match the fine-tune training cadence.
context_steps: 1024
horizon_steps: 96

# Sliding-window evaluation across a long post-training-cutoff range.
# The training data ended 2024-12-31; the model card uses 2023-2024 as
# its test split. Anything from 2025-01-01 onwards is strictly outside
# the training distribution and therefore the cleanest reproduction
# target. We fetch one contiguous hourly series and step a (context,
# horizon) window through it with the configured stride.
sliding_windows:
  range_start: "20250101"
  range_end: "20260501"
  stride_hours: 240   # 10 days between window starts
  max_windows: 40

# The named windows below are kept for the historical / event-tagged
# breakdown in the report. They are evaluated in addition to the sliding
# set, not instead of it.
holdout_windows:
  # Late-Dec 2024 nor'easter (test-split tail).
  - label: "noreaster_2024_12"
    history_start: "20241101"
    history_end: "20241218"
    target_start: "20241218"
    target_end: "20241222"
  # Early Feb 2026 (post-training-cutoff). A nor'easter / cold-air outbreak
  # window outside any training data.
  - label: "feb_2026_post_training"
    history_start: "20251220"
    history_end: "20260205"
    target_start: "20260205"
    target_end: "20260209"
  # Apr-May 2026 fair-weather control (also post-training).
  - label: "may_2026_calm_post_training"
    history_start: "20260315"
    history_end: "20260501"
    target_start: "20260501"
    target_end: "20260505"
